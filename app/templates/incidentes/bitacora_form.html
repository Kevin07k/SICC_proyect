{% extends "base.html" %}

{% block title %}Editar Comentario{% endblock %}
{% block page_title %}Editar Entrada de Bitácora{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-200">
        
        <form action="{{ url_for('procesar_editar_bitacora', bitacora_id=bitacora.id_bitacora) }}" method="POST">
            
            <div class="mb-4">
                <label for="comentario" class="block text-sm font-medium text-gray-700 mb-2">
                    Comentario
                </label>
                <textarea name="comentario" id="comentario" rows="6"
                          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                          required>{{ bitacora.comentario }}</textarea>
            </div>

            <div class="flex justify-end space-x-3 pt-4 border-t">
                <a href="{{ url_for('mostrar_detalle_incidente', incidente_id=bitacora.id_incidente) }}"
                   class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg shadow-md transition duration-200">
                    Cancelar
                </a>
                
                <button type="submit"
                        class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition duration-200">
                    Guardar Cambios
                </button>
            </div>

        </form>
    </div>
</div>
{% endblock %}
