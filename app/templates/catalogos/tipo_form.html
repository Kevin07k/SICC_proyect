{% extends "base.html" %}

{% block title %}
    {% if tipo %}Editar Tipo{% else %}Crear Tipo{% endif %}
{% endblock %}

{% block page_title %}
    {% if tipo %}
        Editar Tipo de Incidente
    {% else %}
        Crear Nuevo Tipo de Incidente
    {% endif %}
{% endblock %}


{% block content %}

    <form action="{% if tipo %}{{ url_for('procesar_editar_tipo', tipo_id=tipo.id_tipo) }}{% else %}{{ url_for('procesar_crear_tipo') }}{% endif %}" 
          method="POST" 
          class="space-y-6 max-w-lg mx-auto bg-blue-50 p-8 rounded-xl shadow-lg border border-blue-200">

        <div>
            <label for="nombre" class="block text-sm font-medium text-gray-700">
                Nombre del Tipo
            </label>
            <input type="text" 
                   name="nombre" 
                   id="nombre"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                   value="{{ tipo.nombre or '' }}" 
                   required>
        </div>

        <div>
            <label for="descripcion" class="block text-sm font-medium text-gray-700">
                Descripción (Opcional)
            </label>
            <textarea name="descripcion" 
                      id="descripcion" 
                      rows="4"
                      class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                      placeholder="Breve descripción del tipo"
                      >{{ tipo.descripcion or '' }}</textarea>
        </div>
        
        <div class="flex justify-end space-x-4 pt-4 border-t mt-6">
            <a href="{{ url_for('mostrar_admin_catalogos') }}"
               class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg shadow-md transition duration-200">
                Cancelar
            </a>
            <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition duration-200">
                Guardar
            </button>
        </div>

    </form>

{% endblock %}
